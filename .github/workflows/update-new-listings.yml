name: Update New Listings

on:
  push:
    paths:
      - 'data/*.csv'
  workflow_dispatch:      # ← this adds a manual "Run" button on GitHub

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run diff script
        run: python generate_new_listings.py

      - name: Commit & push new_listings.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/new_listings.json data/catalogue_meta.json
          git diff --staged --quiet || git commit -m "chore: update new_listings.json [skip ci]"
          git push
