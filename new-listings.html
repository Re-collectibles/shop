<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Listings — Re-collectibles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    .new-badge {
      display: inline-block;
      background: var(--rust);
      color: #fff;
      font-family: var(--font-body);
      font-size: 10px;
      font-style: normal;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 20px;
      margin-bottom: 8px;
    }
    .meta-bar {
      text-align: center;
      font-family: var(--font-body);
      font-size: 13px;
      font-style: italic;
      color: var(--ink-light);
      margin: 0 auto 16px;
      padding: 0 20px;
    }
    .meta-bar strong {
      color: var(--rust);
      font-style: normal;
    }
    .empty-new {
      text-align: center;
      padding: 60px 20px;
      font-style: italic;
      color: var(--ink-light);
      font-size: 15px;
    }
    .empty-new .ornament {
      font-size: 32px;
      color: var(--gold);
      display: block;
      margin-bottom: 12px;
    }
    .site-nav {
      background: var(--ink);
      display: flex;
      justify-content: center;
      border-bottom: 1px solid rgba(184,146,42,0.25);
    }
    .site-nav a {
      font-family: var(--font-body);
      font-size: 12.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(248,243,232,0.7);
      text-decoration: none;
      padding: 10px 22px;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .site-nav a:hover,
    .site-nav a.active {
      color: var(--gold-light);
      border-bottom-color: var(--gold);
    }
    /* Grid wrapper */
    #new-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
      padding: 0 20px;
    }
    /* Expanded panel spans full grid width */
    .new-expanded-panel {
      grid-column: 1 / -1;
      background: #fffdf7;
      border: 1px solid var(--gold);
      border-radius: var(--radius);
      padding: 20px 18px 56px;
      position: relative;
      box-shadow: var(--shadow-hover);
      animation: slideDown 0.3s ease;
    }
    .new-expanded-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--gold);
    }
    .new-expanded-panel p {
      white-space: pre-line;
      font-size: 13px;
      line-height: 1.6;
      color: var(--ink-mid);
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* Truncated preview — no pre-line so clamp works */
    .product .body-preview {
      font-size: 12.5px;
      line-height: 1.5;
      color: var(--ink-light);
      font-style: italic;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      margin: 0 0 8px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="top-header">
    <div class="header-inner">
      <div class="header-flag-title">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Flag_of_New_Zealand.svg" alt="NZ Flag" class="flag">
        <div class="header-title-block">
          <div class="header-eyebrow">Est. Whanganui, New Zealand</div>
          <h1>Re-collectibles</h1>
          <div class="header-subtitle">Bookshop &amp; More</div>
        </div>
      </div>
      <div class="header-divider"></div>
      <div class="header-right">
        <div class="header-info-row">
          <span class="info-icon">✉</span>
          <span>Enquiries &amp; photos: <a href="mailto:malcparknz@gmail.com">malcparknz@gmail.com</a></span>
        </div>
        <div class="header-info-row">
          <span class="info-icon">📦</span>
          <span>Shipping to be calculated</span>
        </div>
        <div class="header-info-row stock-row">
          <span class="info-icon">🆕</span>
          <span id="new-count-header">Loading…</span>
        </div>
      </div>
    </div>
    <div class="header-rule">
      <span class="rule-ornament">❧</span>
    </div>
  </header>

  <!-- Nav -->
  <nav class="site-nav" aria-label="Site navigation">
    <a href="index.html">Full Catalogue</a>
    <a href="new-listings.html" class="active">New Listings</a>
  </nav>

  <!-- New Listings Section -->
  <section class="catalogue-section">
    <div class="section-header">
      <div class="section-rule"></div>
      <h2 class="section-title">
        <span class="section-title-deco">✦</span>
        New Listings
        <span class="section-title-deco">✦</span>
      </h2>
      <div class="section-rule"></div>
    </div>

    <p class="meta-bar" id="meta-bar">Loading…</p>

    <div id="new-grid"></div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-ornament">❦</div>
    <p>Re-collectibles Bookshop &amp; More · Whanganui, New Zealand</p>
    <p><a href="mailto:malcparknz@gmail.com">malcparknz@gmail.com</a></p>
  </footer>

  <script>
    function escapeHtml(str) {
      if (!str) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
    function formatPrice(num) {
      if (num === null || num === undefined || isNaN(num)) return "N/A";
      return `$${Number(num).toFixed(2)}`;
    }

    const grid = document.getElementById("new-grid");

    function toggleExpand(key, fullBody) {
      const existingPanel = document.getElementById("panel-" + key);
      const btn = document.getElementById("btn-" + key);

      if (existingPanel) {
        existingPanel.remove();
        if (btn) btn.textContent = "Read more";
      } else {
        if (btn) btn.textContent = "Show less";

        const panel = document.createElement("div");
        panel.id = "panel-" + key;
        panel.className = "new-expanded-panel";

        // Escape for safe HTML display, keep line breaks
        const safeBody = escapeHtml(fullBody);
        panel.innerHTML = `
          <button class="close-btn" onclick="
            document.getElementById('panel-${key}').remove();
            var b = document.getElementById('btn-${key}');
            if (b) b.textContent = 'Read more';
          ">✕ Close</button>
          <p>${safeBody}</p>
        `;

        // Find the card and insert panel right after it in the grid
        const card = document.getElementById("card-" + key);
        if (card && card.nextSibling) {
          grid.insertBefore(panel, card.nextSibling);
        } else {
          grid.appendChild(panel);
        }
      }
    }

    function renderNewListings(listings) {
      grid.innerHTML = "";

      if (!listings || listings.length === 0) {
        grid.style.display = "block";
        grid.innerHTML = `
          <div class="empty-new">
            <span class="ornament">❧</span>
            No new listings found since the last update.<br>
            Check back after the next catalogue upload.
          </div>`;
        return;
      }

      listings.forEach((item, idx) => {
        const key   = "new_" + idx;
        const title = item.title || "Untitled";
        const body  = item.body  || "";
        const price = formatPrice(item.start_price);
        const stock = (item.stock_amount !== null && item.stock_amount !== undefined)
          ? item.stock_amount : "N/A";

        // Strip newlines for the preview so -webkit-line-clamp works correctly
        const previewText = body.replace(/\r?\n/g, " ").trim();
        const hasMore = previewText.length > 0;

        const card = document.createElement("div");
        card.className = "product";
        card.id = "card-" + key;

        card.innerHTML = `
          <span class="new-badge">New</span>
          <h2>${escapeHtml(title)}</h2>
          ${previewText ? `<p class="body-preview">${escapeHtml(previewText)}</p>` : ""}
          ${hasMore ? `<span class="show-more" id="btn-${key}" onclick="toggleExpand('${key}', ${JSON.stringify(body)})">Read more</span>` : ""}
          <span class="price">${price}</span>
          <span class="stock-right">Qty: ${stock}</span>
        `;

        grid.appendChild(card);
      });
    }

    fetch("data/new_listings.json")
      .then(r => {
        if (!r.ok) throw new Error("not found");
        return r.json();
      })
      .then(data => {
        const count   = data.new_count || 0;
        const genDate = data.generated_at
          ? new Date(data.generated_at).toLocaleDateString("en-NZ", {
              day: "numeric", month: "long", year: "numeric"
            })
          : "unknown date";

        document.getElementById("new-count-header").textContent =
          `${count} new listing${count !== 1 ? "s" : ""} since last update`;

        document.getElementById("meta-bar").innerHTML =
          `<strong>${count}</strong> new item${count !== 1 ? "s" : ""} added &nbsp;·&nbsp; Updated ${genDate}`;

        renderNewListings(data.listings || []);
      })
      .catch(() => {
        document.getElementById("new-count-header").textContent = "Unavailable";
        document.getElementById("meta-bar").textContent = "Could not load new listings data.";
        grid.style.display = "block";
        grid.innerHTML = `
          <div class="empty-new">
            <span class="ornament">⚠</span>
            data/new_listings.json not found.<br>
            Push a new CSV to trigger the GitHub Action, or run<br>
            <code>python generate_new_listings.py</code> locally.
          </div>`;
      });
  </script>
</body>
</html>
