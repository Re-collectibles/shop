<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Listings — Re-collectibles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    .new-badge {
      display: inline-block;
      background: var(--rust);
      color: #fff;
      font-family: var(--font-body);
      font-size: 10px;
      font-style: normal;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 20px;
      margin-bottom: 8px;
    }
    .meta-bar {
      text-align: center;
      font-family: var(--font-body);
      font-size: 13px;
      font-style: italic;
      color: var(--ink-light);
      margin: 0 auto 16px;
      padding: 0 20px;
    }
    .meta-bar strong {
      color: var(--rust);
      font-style: normal;
    }
    .empty-new {
      text-align: center;
      padding: 60px 20px;
      font-style: italic;
      color: var(--ink-light);
      font-size: 15px;
      grid-column: 1 / -1;
    }
    .empty-new .ornament {
      font-size: 32px;
      color: var(--gold);
      display: block;
      margin-bottom: 12px;
    }
    .site-nav {
      background: var(--ink);
      display: flex;
      justify-content: center;
      border-bottom: 1px solid rgba(184,146,42,0.25);
    }
    .site-nav a {
      font-family: var(--font-body);
      font-size: 12.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(248,243,232,0.7);
      text-decoration: none;
      padding: 10px 22px;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .site-nav a:hover,
    .site-nav a.active {
      color: var(--gold-light);
      border-bottom-color: var(--gold);
    }
    /* Expanded panel inside the new-listings grid — must span full width */
    #product-list .catalogue-expanded-panel .new-badge {
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="top-header">
    <div class="header-inner">
      <div class="header-flag-title">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Flag_of_New_Zealand.svg" alt="NZ Flag" class="flag">
        <div class="header-title-block">
          <div class="header-eyebrow">Est. Whanganui, New Zealand</div>
          <h1>Re-collectibles</h1>
          <div class="header-subtitle">Bookshop &amp; More</div>
        </div>
      </div>
      <div class="header-divider"></div>
      <div class="header-right">
        <div class="header-info-row">
          <span class="info-icon">✉</span>
          <span>Enquiries &amp; photos: <a href="mailto:malcparknz@gmail.com">malcparknz@gmail.com</a></span>
        </div>
        <div class="header-info-row">
          <span class="info-icon">📦</span>
          <span>Shipping to be calculated</span>
        </div>
        <div class="header-info-row stock-row">
          <span class="info-icon">🆕</span>
          <span id="new-count-header">Loading…</span>
        </div>
      </div>
    </div>
    <div class="header-rule">
      <span class="rule-ornament">❧</span>
    </div>
  </header>

  <!-- Nav -->
  <nav class="site-nav" aria-label="Site navigation">
    <a href="index.html">Full Catalogue</a>
    <a href="new-listings.html" class="active">New Listings</a>
  </nav>

  <!-- New Listings Section -->
  <section class="catalogue-section">
    <div class="section-header">
      <div class="section-rule"></div>
      <h2 class="section-title">
        <span class="section-title-deco">✦</span>
        New Listings
        <span class="section-title-deco">✦</span>
      </h2>
      <div class="section-rule"></div>
    </div>

    <p class="meta-bar" id="meta-bar">Loading…</p>

    <div class="search-wrapper">
      <div class="search-inner">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" placeholder="Search new listings…" autocomplete="off">
        <button id="clear-search" aria-label="Clear search">✕</button>
      </div>
      <div id="search-count" class="search-count"></div>
    </div>

    <div id="product-list"></div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-ornament">❦</div>
    <p>Re-collectibles Bookshop &amp; More · Whanganui, New Zealand</p>
    <p><a href="mailto:malcparknz@gmail.com">malcparknz@gmail.com</a></p>
  </footer>

  <script>
    /* ── Utilities (identical to script.js) ── */
    function escapeHtml(str) {
      if (str === undefined || str === null) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
    function formatPrice(num) {
      if (num === null || num === undefined || isNaN(num)) return "N/A";
      return `$${Number(num).toFixed(2)}`;
    }
    function truncateText(text, length = 220) {
      if (!text) return "";
      return text.length > length ? text.slice(0, length) + "…" : text;
    }

    const container = document.getElementById("product-list");
    let allListings = [];   // holds the full unfiltered list once loaded

    /* ── Search helpers (mirrors script.js) ── */
    function updateSearchCount(count, isFiltered, query = "") {
      const el = document.getElementById("search-count");
      if (!el) return;
      if (!isFiltered) { el.textContent = ""; return; }
      if (count === 0) {
        el.textContent = `No results found for "${query}"`;
      } else {
        el.textContent = `${count.toLocaleString()} result${count !== 1 ? "s" : ""} for "${query}"`;
      }
    }

    function initSearch() {
      const searchInput = document.getElementById("search");
      const clearBtn    = document.getElementById("clear-search");

      searchInput.addEventListener("input", e => {
        const query = e.target.value.trim().toLowerCase();
        if (!query) {
          renderNewListings(allListings);
          updateSearchCount(allListings.length, false);
          return;
        }
        const filtered = allListings.filter(item => {
          const title = (item.title || "").toLowerCase();
          const body  = (item.body  || "").toLowerCase();
          return title.includes(query) || body.includes(query);
        });
        renderNewListings(filtered);
        updateSearchCount(filtered.length, true, query);
      });

      clearBtn.addEventListener("click", () => {
        searchInput.value = "";
        renderNewListings(allListings);
        updateSearchCount(allListings.length, false);
        searchInput.focus();
      });
    }

    /* ── Render new listings
         Mirrors renderAllProducts() in script.js exactly:
         - Card appended to the grid
         - "Read more" inserts a .catalogue-expanded-panel immediately after
           the card as a grid child → grid-column:1/-1 spans full width
         - Clicking "Read more" on an already-open card closes it
         - Opening a new card closes any previously open panel
    ── */
    function renderNewListings(listings) {
      container.innerHTML = "";

      if (!listings || listings.length === 0) {
        container.innerHTML = `
          <div class="empty-new">
            <span class="ornament">❧</span>
            No new listings found since the last update.<br>
            Check back after the next catalogue upload.
          </div>`;
        return;
      }

      listings.forEach(item => {
        const div = document.createElement("div");
        div.className = "product";

        const title = item.title || "Untitled";
        const body  = item.body  || "";
        const price = formatPrice(item.start_price);

        let stock = "N/A";
        if (item.stock_amount !== undefined && item.stock_amount !== null) {
          stock = item.stock_amount;
        }

        const truncated = truncateText(body, 220);
        const hasMore   = body.length > 220;

        div.innerHTML = `
          <span class="new-badge">New</span>
          <h2>${escapeHtml(title)}</h2>
          <div class="truncated">${escapeHtml(truncated)}</div>
          ${hasMore ? `<div class="show-more" role="button" tabindex="0">Read more</div>` : ""}
          <div class="price">${price}</div>
          <div class="stock-right">Qty: ${escapeHtml(String(stock))}</div>
        `;

        if (hasMore) {
          const showMoreBtn = div.querySelector(".show-more");

          const openPanel = () => {
            /* If this card's panel is already open — close it */
            const next = div.nextElementSibling;
            if (next && next.classList.contains("catalogue-expanded-panel")) {
              next.remove();
              return;
            }

            /* Close any other open panel */
            document.querySelectorAll(".catalogue-expanded-panel").forEach(el => el.remove());

            /* Build the full-width expanded panel */
            const panel = document.createElement("div");
            panel.className = "catalogue-expanded-panel";
            panel.innerHTML = `
              <button class="close-btn">✕ Close</button>
              <span class="new-badge">New</span>
              <h2>${escapeHtml(title)}</h2>
              <p>${escapeHtml(body)}</p>
              <div class="price">${price}</div>
              <div class="stock-right">Qty: ${escapeHtml(String(stock))}</div>
            `;

            panel.querySelector(".close-btn").addEventListener("click", () => panel.remove());

            /* Insert directly after the card inside the grid */
            div.after(panel);
            panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
          };

          showMoreBtn.addEventListener("click", openPanel);
          showMoreBtn.addEventListener("keydown", e => {
            if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openPanel(); }
          });
        }

        container.appendChild(div);
      });
    }

    /* ── Load data/new_listings.json (generated by generate_new_listings.py) ── */
    fetch("data/new_listings.json")
      .then(r => {
        if (!r.ok) throw new Error("not found");
        return r.json();
      })
      .then(data => {
        const count   = data.new_count || 0;
        const genDate = data.generated_at
          ? new Date(data.generated_at).toLocaleDateString("en-NZ", {
              day: "numeric", month: "long", year: "numeric"
            })
          : "unknown date";

        document.getElementById("new-count-header").textContent =
          `${count} new listing${count !== 1 ? "s" : ""} since last update`;

        document.getElementById("meta-bar").innerHTML =
          `<strong>${count}</strong> new item${count !== 1 ? "s" : ""} added &nbsp;·&nbsp; Updated ${genDate}`;

        allListings = data.listings || [];
        renderNewListings(allListings);
        initSearch();
      })
      .catch(() => {
        document.getElementById("new-count-header").textContent = "Unavailable";
        document.getElementById("meta-bar").textContent = "Could not load new listings data.";
        container.innerHTML = `
          <div class="empty-new">
            <span class="ornament">⚠</span>
            data/new_listings.json not found.<br>
            Push a new CSV to trigger the GitHub Action, or run<br>
            <code>python generate_new_listings.py</code> locally.
          </div>`;
      });
  </script>
</body>
</html>
